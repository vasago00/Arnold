name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: arnold-app/package-lock.json

      - name: Install dependencies
        working-directory: arnold-app
        run: npm ci

      - name: Build (web)
        working-directory: arnold-app
        run: npx vite build

      - name: Test (vitest)
        working-directory: arnold-app
        run: npm test
