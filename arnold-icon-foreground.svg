<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="arcG" x1="0" y1="0.8" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#5ec2d4" />
      <stop offset="50%" stop-color="#6babdf" />
      <stop offset="100%" stop-color="#7bd0e8" />
    </linearGradient>
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>

  <!-- Offset: (108-128)/2 = -10, so translate by -10 to center 128-unit design in 108 -->
  <!-- Actually scale down: 72/128 = 0.5625, offset = (108-72)/2 = 18 -->
  <g transform="translate(18, 18) scale(0.5625)">

    <!-- Faint track -->
    <circle cx="64" cy="64" r="42" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="5" />

    <!-- Arc bloom -->
    <path d="M 27.63 85.00 A 42 42 0 1 1 106.00 64.00"
          fill="none" stroke="#6babdf" stroke-width="10" stroke-linecap="round"
          opacity="0.12" filter="url(#bloom)" />

    <!-- Main arc -->
    <path d="M 27.63 85.00 A 42 42 0 1 1 106.00 64.00"
          fill="none" stroke="url(#arcG)" stroke-width="5.5" stroke-linecap="round"
          filter="url(#arcGlow)" />

    <!-- Arc endpoint glow -->
    <circle cx="27.63" cy="85.00" r="3" fill="#5ec2d4" opacity="0.2" />
    <circle cx="106.00" cy="64.00" r="3" fill="#7bd0e8" opacity="0.2" />

    <!-- A monogram -->
    <text x="64" y="72" text-anchor="middle"
          fill="rgba(255,255,255,0.95)" font-size="35" font-weight="800"
          font-family="Inter, system-ui, sans-serif" letter-spacing="-0.5">A</text>

    <!-- Icons (bolder for clarity) -->
    <g transform="translate(100.4, 85.0)">
      <path d="M-3.5 0h7" fill="none" stroke="#6babdf" stroke-width="2.4" stroke-linecap="round" />
      <path d="M1.8 -2.6l3.2 2.6-3.2 2.6" fill="none" stroke="#6babdf" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <g transform="translate(85.0, 100.4)">
      <path d="M-4 2.5l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M-4 -0.2l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
    </g>
    <g transform="translate(64.0, 106.0)">
      <rect x="-5.2" y="-3.2" width="9" height="6.4" rx="1.4" fill="none" stroke="#6bcf9a" stroke-width="1.8" />
      <line x1="-2.2" y1="-1.4" x2="-2.2" y2="1.4" stroke="#6bcf9a" stroke-width="2" stroke-linecap="round" />
    </g>
    <g transform="translate(43.0, 100.4)">
      <circle cx="0" cy="-3" r="2.5" fill="none" stroke="#e0b45e" stroke-width="1.8" />
      <path d="M-4.2 4.5v-0.8a4.2 4.2 0 0 1 8.4 0v0.8" fill="none" stroke="#e0b45e" stroke-width="1.8" stroke-linecap="round" />
    </g>

  </g>
</svg>