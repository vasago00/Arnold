<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnold Icon v6 — Final</title>
<style>
  body { background: #0b0c12; color: #fff; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 32px; }
  .section-label { font-size: 10px; color: rgba(255,255,255,0.3); margin: 0 0 16px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  .row { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 40px; }
  .preview { text-align: center; }
  .preview .label { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 8px; }

  .homescreen {
    margin: 0 auto; max-width: 320px; padding: 28px 20px;
    background: linear-gradient(160deg, #777, #8a8a8a, #6e6e6e);
    border-radius: 22px;
  }
  .hs-row { display: flex; justify-content: space-around; }
  .hs-icon { text-align: center; }
  .hs-icon .hs-label { font-size: 8px; color: rgba(255,255,255,0.85); margin-top: 5px; font-weight: 500; }
  .hs-placeholder { width: 52px; height: 52px; border-radius: 13px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════ -->
<p class="section-label">Large preview</p>
<div class="row">

  <div class="preview">
    <svg width="192" height="192" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6babdf" />
          <stop offset="100%" stop-color="#5ec2d4" />
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="50%" r="30%">
          <stop offset="0%" stop-color="#6babdf" stop-opacity="0.05" />
          <stop offset="100%" stop-color="#6babdf" stop-opacity="0" />
        </radialGradient>
      </defs>

      <!-- Background -->
      <rect width="128" height="128" rx="28" fill="#0e1019" />

      <!-- Subtle center glow -->
      <circle cx="64" cy="64" r="40" fill="url(#glow)" />

      <!-- Track (faint full circle) -->
      <circle cx="64" cy="64" r="42" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="4" />

      <!-- ═══ 270° ARC — gap on left side (7 o'clock to 11 o'clock) ═══ -->
      <!-- From SVG 205° CW to SVG 115° = 270° -->
      <!-- Start (205°): (25.94, 46.25)  End (115°): (46.25, 102.06) -->
      <path d="M 25.94 46.25 A 42 42 0 1 1 46.25 102.06"
            fill="none" stroke="url(#arc)" stroke-width="4.2" stroke-linecap="round" />

      <!-- A monogram -->
      <text x="64" y="72" text-anchor="middle"
            fill="rgba(255,255,255,0.94)" font-size="33" font-weight="800"
            font-family="Inter, system-ui, sans-serif" letter-spacing="-0.5">A</text>

      <!-- ═══ 4 CATEGORY ICONS IN THE GAP ═══ -->
      <!-- Placed along r=42 arc from 115° to 205° (the 90° gap) -->

      <!-- Body (person) — at ~130° (near bottom of gap) -->
      <!-- 130°: (64+42*cos130, 64+42*sin130) = (37, 96.2) -->
      <g transform="translate(37, 96.2) scale(0.85)">
        <circle cx="0" cy="-3" r="2.3" fill="none" stroke="#e0b45e" stroke-width="1.5" stroke-linecap="round" />
        <path d="M-4.2 5v-1a4.2 4.2 0 0 1 8.4 0v1" fill="none" stroke="#e0b45e" stroke-width="1.5" stroke-linecap="round" />
      </g>

      <!-- Recovery (battery) — at ~148° -->
      <!-- 148°: (64+42*cos148, 64+42*sin148) = (28.4, 86.3) -->
      <g transform="translate(28.4, 86.3) scale(0.85)">
        <rect x="-5.2" y="-3.2" width="9" height="6.4" rx="1.4" fill="none" stroke="#6bcf9a" stroke-width="1.4" stroke-linecap="round" />
        <path d="M3.8 -1.2h1.2a0.7 0.7 0 0 1 0.7 0.7v1a0.7 0.7 0 0 1-0.7 0.7H3.8" fill="none" stroke="#6bcf9a" stroke-width="1.2" />
        <line x1="-2.2" y1="-1.3" x2="-2.2" y2="1.3" stroke="#6bcf9a" stroke-width="1.6" stroke-linecap="round" />
        <line x1="0.2" y1="-1.3" x2="0.2" y2="1.3" stroke="#6bcf9a" stroke-width="1.3" stroke-linecap="round" opacity="0.4" />
      </g>

      <!-- Strength (power stack) — at ~168° -->
      <!-- 168°: (64+42*cos168, 64+42*sin168) = (22.9, 72.7) -->
      <g transform="translate(22.9, 72.7) scale(0.85)">
        <path d="M-4 2.5l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M-4 -0.2l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
        <path d="M-4 -2.8l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" />
      </g>

      <!-- Run (forward arrow) — at ~188° (near top of gap) -->
      <!-- 188°: (64+42*cos188, 64+42*sin188) = (22.4, 58.2) -->
      <g transform="translate(22.4, 58.2) scale(0.85)">
        <path d="M-3.5 0h7" fill="none" stroke="#6babdf" stroke-width="1.8" stroke-linecap="round" />
        <path d="M1.5 -2.5l3.2 2.5-3.2 2.5" fill="none" stroke="#6babdf" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      </g>

    </svg>
    <div class="label">128px preview</div>
  </div>

  <!-- Smaller preview -->
  <div class="preview">
    <svg width="96" height="96" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6babdf" />
          <stop offset="100%" stop-color="#5ec2d4" />
        </linearGradient>
      </defs>
      <rect width="128" height="128" rx="28" fill="#0e1019" />
      <circle cx="64" cy="64" r="42" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="4" />
      <path d="M 25.94 46.25 A 42 42 0 1 1 46.25 102.06" fill="none" stroke="url(#arc2)" stroke-width="4.2" stroke-linecap="round" />
      <text x="64" y="72" text-anchor="middle" fill="rgba(255,255,255,0.94)" font-size="33" font-weight="800" font-family="Inter, system-ui" letter-spacing="-0.5">A</text>
      <g transform="translate(37, 96.2) scale(0.85)"><circle cx="0" cy="-3" r="2.3" fill="none" stroke="#e0b45e" stroke-width="1.5" /><path d="M-4.2 5v-1a4.2 4.2 0 0 1 8.4 0v1" fill="none" stroke="#e0b45e" stroke-width="1.5" stroke-linecap="round" /></g>
      <g transform="translate(28.4, 86.3) scale(0.85)"><rect x="-5.2" y="-3.2" width="9" height="6.4" rx="1.4" fill="none" stroke="#6bcf9a" stroke-width="1.4" /><line x1="-2.2" y1="-1.3" x2="-2.2" y2="1.3" stroke="#6bcf9a" stroke-width="1.6" stroke-linecap="round" /></g>
      <g transform="translate(22.9, 72.7) scale(0.85)"><path d="M-4 2.5l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /><path d="M-4 -0.2l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" /></g>
      <g transform="translate(22.4, 58.2) scale(0.85)"><path d="M-3.5 0h7" fill="none" stroke="#6babdf" stroke-width="1.8" stroke-linecap="round" /><path d="M1.5 -2.5l3.2 2.5-3.2 2.5" fill="none" stroke="#6babdf" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" /></g>
    </svg>
    <div class="label">96px</div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<p class="section-label">Home screen simulation — 52px actual size</p>
<div class="homescreen">
  <div class="hs-row">
    <div class="hs-icon">
      <div style="width:52px; height:52px; border-radius:13px; overflow:hidden;">
        <svg width="52" height="52" viewBox="0 0 128 128">
          <defs><linearGradient id="arc3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6babdf" /><stop offset="100%" stop-color="#5ec2d4" /></linearGradient></defs>
          <rect width="128" height="128" rx="28" fill="#0e1019" />
          <circle cx="64" cy="64" r="42" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="5" />
          <path d="M 25.94 46.25 A 42 42 0 1 1 46.25 102.06" fill="none" stroke="url(#arc3)" stroke-width="5.5" stroke-linecap="round" />
          <text x="64" y="72" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="35" font-weight="800" font-family="Inter, system-ui" letter-spacing="-0.5">A</text>
          <!-- Icons slightly bolder at small size -->
          <g transform="translate(37, 96.2)"><circle cx="0" cy="-3" r="2.5" fill="none" stroke="#e0b45e" stroke-width="2" /><path d="M-4.5 5v-1a4.5 4.5 0 0 1 9 0v1" fill="none" stroke="#e0b45e" stroke-width="2" stroke-linecap="round" /></g>
          <g transform="translate(28.4, 86.3)"><rect x="-5.5" y="-3.5" width="9.5" height="7" rx="1.5" fill="none" stroke="#6bcf9a" stroke-width="1.8" /><line x1="-2.5" y1="-1.5" x2="-2.5" y2="1.5" stroke="#6bcf9a" stroke-width="2" stroke-linecap="round" /></g>
          <g transform="translate(22.9, 72.7)"><path d="M-4 2.5l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /><path d="M-4 -0.2l4-3 4 2.5" fill="none" stroke="#ab9ed4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" /></g>
          <g transform="translate(22.4, 58.2)"><path d="M-3.5 0h7" fill="none" stroke="#6babdf" stroke-width="2.2" stroke-linecap="round" /><path d="M1.5 -2.5l3.2 2.5-3.2 2.5" fill="none" stroke="#6babdf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></g>
        </svg>
      </div>
      <div class="hs-label">Arnold</div>
    </div>

    <div class="hs-icon">
      <div class="hs-placeholder" style="background: linear-gradient(135deg, #4285F4, #34A853); border-radius: 13px;"></div>
      <div class="hs-label">Gemini</div>
    </div>

    <div class="hs-icon">
      <div class="hs-placeholder" style="background: #1a1a1a; border-radius: 13px; display:flex; align-items:center; justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.28-1.23 3.28-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58A12.01 12.01 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </div>
      <div class="hs-label">GitHub</div>
    </div>

    <div class="hs-icon">
      <div class="hs-placeholder" style="background: linear-gradient(135deg, #FF6B35, #FF4500); border-radius: 13px;"></div>
      <div class="hs-label">Strava</div>
    </div>
  </div>
</div>

</body>
</html>
